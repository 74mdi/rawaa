<svg xmlns="http://www.w3.org/2000/svg" width="400" height="500" viewBox="0 0 320 400">
    <defs>
      <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#2a1a0a"/>
        <stop offset="100%" stop-color="#160600"/>
      </linearGradient>
      <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.15"/>
        <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
      </linearGradient>
      <filter id="softGlow">
        <feGaussianBlur stdDeviation="3" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
    <rect width="320" height="400" rx="20" fill="url(#bg)"/>
    <rect x="40" y="40" width="240" height="320" rx="12" fill="none" stroke="#c9a84c" stroke-width="0.5" opacity="0.3"/>
    <rect x="60" y="60" width="200" height="280" rx="8" fill="none" stroke="#c9a84c" stroke-width="0.3" opacity="0.2"/>
    <circle cx="160" cy="120" r="80" fill="url(#glow)"/>
    <ellipse cx="160" cy="200" rx="60" ry="120" fill="#2a1a0a" stroke="#c9a84c" stroke-width="1"/>
<path d="M130 160 Q160 100 190 160" fill="none" stroke="#c9a84c" stroke-width="2"/>
<circle cx="160" cy="140" r="15" fill="#c9a84c" opacity="0.3"/>

    <text x="160" y="360" text-anchor="middle" fill="#c9a84c" font-family="serif" font-size="14" letter-spacing="3" opacity="0.6">RA AWA</text>
  </svg>